<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Auspicious Consultants</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3248;
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --green: #22c55e;
            --amber: #f59e0b;
            --red: #ef4444;
            --text: #e2e8f0;
            --muted: #8892b0;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Topbar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 64px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .topbar-brand .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: grid;
            place-items: center;
            font-size: 16px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .badge-unread {
            background: var(--red);
            color: #fff;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .btn-refresh {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: .2s;
        }

        .btn-refresh:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Main ── */
        .main {
            flex: 1;
            padding: 32px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── Stats ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform .2s, border-color .2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .stat-icon.purple {
            background: rgba(108, 99, 255, .15);
            color: var(--accent);
        }

        .stat-icon.amber {
            background: rgba(245, 158, 11, .15);
            color: var(--amber);
        }

        .stat-icon.green {
            background: rgba(34, 197, 94, .15);
            color: var(--green);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-label {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .toolbar h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box i {
            position: absolute;
            left: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .search-box input {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px 8px 34px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            width: 240px;
            outline: none;
            transition: .2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .filter-tabs {
            display: flex;
            gap: 6px;
        }

        .tab {
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 13px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--muted);
            cursor: pointer;
            transition: .2s;
            font-family: inherit;
        }

        .tab.active,
        .tab:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ── Table ── */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 14px 18px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .15s;
            cursor: pointer;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--surface2);
        }

        tbody tr.unread td:first-child {
            border-left: 3px solid var(--accent);
        }

        tbody tr.unread {
            background: rgba(108, 99, 255, .04);
        }

        td {
            padding: 14px 18px;
            font-size: 13.5px;
            vertical-align: middle;
        }

        .td-name {
            font-weight: 600;
        }

        .td-email {
            color: var(--muted);
            font-size: 12.5px;
        }

        .td-subject {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .td-date {
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .pill.unread {
            background: rgba(108, 99, 255, .2);
            color: var(--accent2);
        }

        .pill.read {
            background: rgba(34, 197, 94, .15);
            color: var(--green);
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 6px;
            transition: .15s;
            font-size: 14px;
        }

        .action-btn:hover.del {
            color: var(--red);
            background: rgba(239, 68, 68, .1);
        }

        .action-btn:hover.read-toggle {
            color: var(--green);
            background: rgba(34, 197, 94, .1);
        }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty i {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
            opacity: .4;
        }

        /* ── Loader ── */
        .loader-row td {
            text-align: center;
            padding: 50px;
            color: var(--muted);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 580px;
            padding: 32px;
            position: relative;
            animation: slideUp .2s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: grid;
            place-items: center;
            transition: .15s;
        }

        .modal-close:hover {
            color: var(--text);
            border-color: var(--text);
        }

        .modal h3 {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .modal-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .meta-item label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
            display: block;
            margin-bottom: 4px;
        }

        .meta-item span {
            font-size: 14px;
            font-weight: 500;
        }

        .modal-message-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .modal-message-body {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 200px;
            overflow-y: auto;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .btn-danger {
            background: rgba(239, 68, 68, .15);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, .3);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            transition: .2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-danger:hover {
            background: var(--red);
            color: #fff;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: 1px solid var(--accent);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            transition: .2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary:hover {
            opacity: .85;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 300;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(80px);
            opacity: 0;
            transition: .3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--green);
        }

        .toast.success i {
            color: var(--green);
        }

        .toast.error {
            border-color: var(--red);
        }

        .toast.error i {
            color: var(--red);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .main {
                padding: 16px;
            }

            .modal-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-brand">
            <div class="logo-icon"><i class="fa-solid fa-chart-line"></i></div>
            Auspicious <span style="color:var(--accent);margin-left:4px">Admin</span>
        </div>
        <div class="topbar-right">
            <span id="unread-badge" class="badge-unread" style="display:none">0 Unread</span>
            <span id="admin-user-label"
                style="color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px">
                <i class="fa-solid fa-circle-user" style="color:var(--accent2)"></i>
                <span id="admin-username">Admin</span>
            </span>
            <button class="btn-refresh" onclick="loadMessages()">
                <i class="fa-solid fa-rotate-right"></i> Refresh
            </button>
            <a href="../index.html" style="color:var(--muted);font-size:13px;text-decoration:none;">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> View Site
            </a>
            <button class="btn-refresh" onclick="logout()" style="color:var(--red);border-color:rgba(239,68,68,.3);">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="main">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fa-solid fa-inbox"></i></div>
                <div>
                    <div class="stat-value" id="stat-total">—</div>
                    <div class="stat-label">Total Messages</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amber"><i class="fa-solid fa-envelope"></i></div>
                <div>
                    <div class="stat-value" id="stat-unread">—</div>
                    <div class="stat-label">Unread Messages</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fa-solid fa-calendar-day"></i></div>
                <div>
                    <div class="stat-value" id="stat-today">—</div>
                    <div class="stat-label">Received Today</div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <h2><i class="fa-solid fa-message" style="color:var(--accent);margin-right:8px"></i>Contact Submissions</h2>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                <div class="filter-tabs">
                    <button class="tab active" onclick="setFilter('all', this)">All</button>
                    <button class="tab" onclick="setFilter('unread', this)">Unread</button>
                    <button class="tab" onclick="setFilter('read', this)">Read</button>
                </div>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search name, email, subject…"
                        oninput="renderTable()">
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Subject</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="msg-table-body">
                    <tr class="loader-row">
                        <td colspan="7">
                            <div class="spinner"></div>
                            Loading messages…
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <h3 id="modal-subject"></h3>
            <div class="modal-meta">
                <div class="meta-item">
                    <label>From</label>
                    <span id="modal-name"></span>
                </div>
                <div class="meta-item">
                    <label>Email</label>
                    <span id="modal-email"></span>
                </div>
                <div class="meta-item">
                    <label>Received</label>
                    <span id="modal-date"></span>
                </div>
                <div class="meta-item">
                    <label>Status</label>
                    <span id="modal-status"></span>
                </div>
            </div>
            <div class="modal-message-label">Message</div>
            <div class="modal-message-body" id="modal-message"></div>
            <div class="modal-actions">
                <button class="btn-danger" id="modal-delete-btn" onclick="handleDelete()">
                    <i class="fa-solid fa-trash"></i> Delete
                </button>
                <button class="btn-primary" id="modal-read-btn" onclick="handleToggleRead()">
                    <i class="fa-solid fa-envelope-open"></i> Mark as Read
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toast-msg"></span>
    </div>

    <script>
        /* ── Auth Guard ── */
        (async () => {
            try {
                const res = await fetch('../api/admin_auth.php');
                const data = await res.json();
                if (!data.authenticated) {
                    window.location.replace('login.html');
                } else {
                    const el = document.getElementById('admin-username');
                    if (el) el.textContent = data.user;
                }
            } catch (_) {
                window.location.replace('login.html');
            }
        })();

        /* ── Logout ── */
        async function logout() {
            await fetch('../api/admin_auth.php', { method: 'POST' });
            window.location.replace('login.html');
        }

        let allMessages = [];
        let currentFilter = 'all';
        let activeMsg = null;

        /* ── Fetch ── */
        async function loadMessages() {
            document.getElementById('msg-table-body').innerHTML =
                `<tr class="loader-row"><td colspan="7"><div class="spinner"></div>Loading messages…</td></tr>`;

            try {
                const res = await fetch('../api/get_messages.php');
                const data = await res.json();

                if (!data.success) throw new Error(data.message);

                allMessages = data.messages;
                const s = data.stats;

                document.getElementById('stat-total').textContent = s.total || 0;
                document.getElementById('stat-unread').textContent = s.unread || 0;
                document.getElementById('stat-today').textContent = s.today || 0;

                const badge = document.getElementById('unread-badge');
                if (s.unread > 0) {
                    badge.textContent = s.unread + ' Unread';
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }

                renderTable();
            } catch (e) {
                document.getElementById('msg-table-body').innerHTML =
                    `<tr class="loader-row"><td colspan="7" style="color:var(--red)">
                    <i class="fa-solid fa-triangle-exclamation" style="display:block;font-size:2rem;margin-bottom:8px"></i>
                    Failed to load: ${e.message}
                 </td></tr>`;
            }
        }

        /* ── Render ── */
        function renderTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let rows = allMessages.filter(m => {
                if (currentFilter === 'unread' && m.is_read == 1) return false;
                if (currentFilter === 'read' && m.is_read == 0) return false;
                if (q) {
                    return m.name.toLowerCase().includes(q)
                        || m.email.toLowerCase().includes(q)
                        || m.subject.toLowerCase().includes(q);
                }
                return true;
            });

            if (!rows.length) {
                document.getElementById('msg-table-body').innerHTML =
                    `<tr><td colspan="7">
                    <div class="empty">
                        <i class="fa-regular fa-envelope"></i>
                        No messages found
                    </div>
                 </td></tr>`;
                return;
            }

            document.getElementById('msg-table-body').innerHTML = rows.map(m => `
            <tr class="${m.is_read == 0 ? 'unread' : ''}" onclick="openModal(${m.id})" id="row-${m.id}">
                <td style="color:var(--muted);font-size:12px">#${m.id}</td>
                <td>
                    <div class="td-name">${esc(m.name)}</div>
                    <div class="td-email">${esc(m.email)}</div>
                </td>
                <td>${esc(m.email)}</td>
                <td class="td-subject">${esc(m.subject)}</td>
                <td class="td-date">${formatDate(m.submitted_at)}</td>
                <td>
                    <span class="pill ${m.is_read == 0 ? 'unread' : 'read'}">
                        <i class="fa-solid fa-circle" style="font-size:6px"></i>
                        ${m.is_read == 0 ? 'Unread' : 'Read'}
                    </span>
                </td>
                <td onclick="event.stopPropagation()">
                    <button class="action-btn read-toggle" title="${m.is_read == 0 ? 'Mark read' : 'Mark unread'}"
                        onclick="quickToggle(${m.id})">
                        <i class="fa-solid ${m.is_read == 0 ? 'fa-envelope-open' : 'fa-envelope'}"></i>
                    </button>
                    <button class="action-btn del" title="Delete" onclick="quickDelete(${m.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
        }

        /* ── Filter tabs ── */
        function setFilter(f, el) {
            currentFilter = f;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderTable();
        }

        /* ── Modal ── */
        function openModal(id) {
            const m = allMessages.find(x => x.id == id);
            if (!m) return;
            activeMsg = m;

            document.getElementById('modal-subject').textContent = m.subject;
            document.getElementById('modal-name').textContent = m.name;
            document.getElementById('modal-email').textContent = m.email;
            document.getElementById('modal-date').textContent = formatDate(m.submitted_at);
            document.getElementById('modal-message').textContent = m.message;
            document.getElementById('modal-status').innerHTML =
                `<span class="pill ${m.is_read == 0 ? 'unread' : 'read'}">${m.is_read == 0 ? 'Unread' : 'Read'}</span>`;

            const readBtn = document.getElementById('modal-read-btn');
            readBtn.innerHTML = m.is_read == 0
                ? '<i class="fa-solid fa-envelope-open"></i> Mark as Read'
                : '<i class="fa-solid fa-envelope"></i> Mark as Unread';

            document.getElementById('modal').classList.add('open');

            // auto-mark as read
            if (m.is_read == 0) doAction('mark_read', id, false);
        }

        function closeModal() { document.getElementById('modal').classList.remove('open'); activeMsg = null; }
        function handleOverlayClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }

        function handleDelete() { if (activeMsg) { doAction('delete', activeMsg.id, true); closeModal(); } }
        function handleToggleRead() {
            if (!activeMsg) return;
            doAction(activeMsg.is_read == 0 ? 'mark_read' : 'mark_unread', activeMsg.id, true);
            closeModal();
        }

        /* ── Quick row actions ── */
        function quickToggle(id) {
            const m = allMessages.find(x => x.id == id);
            if (!m) return;
            doAction(m.is_read == 0 ? 'mark_read' : 'mark_unread', id, true);
        }
        function quickDelete(id) { doAction('delete', id, true); }

        /* ── API action ── */
        async function doAction(action, id, reload) {
            try {
                const res = await fetch('../api/message_action.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, id })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    if (reload) loadMessages();
                    else {
                        // silent update for auto-mark-read
                        const m = allMessages.find(x => x.id == id);
                        if (m) { m.is_read = 1; renderTable(); }
                    }
                } else {
                    showToast(data.message, 'error');
                }
            } catch (e) {
                showToast('Request failed.', 'error');
            }
        }

        /* ── Toast ── */
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            const icon = t.querySelector('i');
            t.className = `toast ${type}`;
            icon.className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark';
            document.getElementById('toast-msg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        /* ── Helpers ── */
        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function formatDate(d) {
            return new Date(d).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // Initial load
        loadMessages();
    </script>
</body>

</html>
